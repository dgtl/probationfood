<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramona's Meal Order Form</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(61,29,11,.18), rgba(61,29,11,.18)),
        url('https://lirp.cdn-website.com/c174546f/dms3rep/multi/opt/logo-1920w.png') center / 420px repeat,
        #d89024;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 28px;
      border-radius: 20px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 8px 30px rgba(0,0,0,.3);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      color: #5a160f;
    }

    .intro {
      margin-bottom: 20px;
      font-size: 16px;
      color: #333;
    }

    .section {
      margin-top: 25px;
      font-weight: bold;
      font-size: 18px;
      color: #5a160f;
    }

    .field {
      margin-top: 12px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(0,0,0,.1);
    }

    label.main {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    select,
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .radio-group,
    .checkbox-group {
      display: grid;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: white;
      border-radius: 8px;
      border: 1px solid #eee;
      cursor: pointer;
      font-weight: normal;
    }

    .item input {
      width: auto;
      margin: 0;
    }

    .serial-label-top {
      margin-bottom: 6px;
      font-weight: bold;
      color: #5a160f;
    }

    .picker-wrap {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: nowrap;
      overflow-x: auto;
      overflow-y: hidden;
      padding: 4px 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .picker-wrap::-webkit-scrollbar {
      display: none;
    }

    .picker-wheel {
      flex: 0 0 56px;
      width: 56px;
      height: 164px;
      position: relative;
      border-radius: 14px;
      background: linear-gradient(180deg, #f8f8f8, #d7d7d7);
      border: 1px solid #aaa;
      box-shadow:
        inset 0 2px 6px rgba(255,255,255,.85),
        inset 0 -2px 6px rgba(0,0,0,.12),
        0 4px 12px rgba(0,0,0,.18);
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
      -webkit-user-select: none;
    }

    .picker-wheel::before,
    .picker-wheel::after {
      content: "";
      position: absolute;
      left: 0;
      width: 100%;
      height: 42px;
      z-index: 5;
      pointer-events: none;
    }

    .picker-wheel::before {
      top: 0;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(255,255,255,0));
    }

    .picker-wheel::after {
      bottom: 0;
      background: linear-gradient(0deg, rgba(255,255,255,.96), rgba(255,255,255,0));
    }

    .picker-highlight {
      position: absolute;
      left: 0;
      top: 62px;
      width: 100%;
      height: 40px;
      z-index: 6;
      pointer-events: none;
      background: rgba(255,255,255,.38);
      border-top: 2px solid rgba(90,22,15,.55);
      border-bottom: 2px solid rgba(90,22,15,.55);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.9),
        inset 0 -1px 0 rgba(255,255,255,.9),
        0 0 0 1px rgba(90,22,15,.08);
    }

    .picker-list {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      will-change: transform;
      z-index: 1;
    }

    .picker-item {
      height: 40px;
      line-height: 40px;
      text-align: center;
      font-size: 30px;
      font-weight: 700;
      color: #9a9a9a;
      opacity: .38;
      font-variant-numeric: tabular-nums;
      transition: color 120ms ease, opacity 120ms ease, transform 120ms ease;
    }

    .picker-item.near {
      color: #6f6f6f;
      opacity: .62;
    }

    .picker-item.selected {
      color: #111;
      opacity: 1;
      transform: scale(1.04);
    }

    button {
      background: #8b1e14;
      color: white;
      border: none;
      font-weight: bold;
      margin-top: 15px;
      cursor: pointer;
    }

    button:hover {
      background: #74180f;
    }

    button:disabled {
      opacity: .7;
      cursor: not-allowed;
    }

    .hidden {
      display: none;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
      min-height: 20px;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      .container {
        padding: 16px;
      }

      h1 {
        font-size: 28px;
      }

      .picker-wrap {
        gap: 6px;
        justify-content: flex-start;
      }

      .picker-wheel {
        flex: 0 0 52px;
        width: 52px;
        height: 156px;
      }

      .picker-highlight {
        top: 58px;
        height: 40px;
        border-top: 2px solid rgba(90,22,15,.65);
        border-bottom: 2px solid rgba(90,22,15,.65);
      }

      .picker-item {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Ramona's Meal Order Form</h1>
  <p class="intro">Tell Sgt Dear your food order below.</p>

  <form id="mealForm">
    <div class="field">
      <div style="margin-bottom:6px;font-weight:bold;">Who's eating this order?</div>
      <label class="main" for="memberName">Your Name</label>
      <select id="memberName" required>
        <option value="">Loading names...</option>
      </select>
    </div>

    <div class="field">
      <div class="serial-label-top">Serial Number</div>
      <label class="main">Set your serial №</label>

      <div id="serialContainer" class="picker-wrap">
        <div class="picker-wheel" data-index="0">
          <div class="picker-highlight"></div>
          <div class="picker-list"></div>
        </div>
        <div class="picker-wheel" data-index="1">
          <div class="picker-highlight"></div>
          <div class="picker-list"></div>
        </div>
        <div class="picker-wheel" data-index="2">
          <div class="picker-highlight"></div>
          <div class="picker-list"></div>
        </div>
        <div class="picker-wheel" data-index="3">
          <div class="picker-highlight"></div>
          <div class="picker-list"></div>
        </div>
        <div class="picker-wheel" data-index="4">
          <div class="picker-highlight"></div>
          <div class="picker-list"></div>
        </div>
      </div>
    </div>

    <div class="section">Meal Selection</div>

    <div class="field">
      <div class="radio-group">
        <label class="item">
          <input type="radio" name="mealType" value="Burrito">
          Burrito
        </label>

        <label class="item">
          <input type="radio" name="mealType" value="3 Tacos">
          3 Tacos
        </label>
      </div>
    </div>

    <div id="burritoSection" class="hidden">
      <div class="field">
        <label class="main">Burrito Choice</label>
        <div class="radio-group">
          <label class="item"><input type="radio" name="burritoChoice" value="Beef & Red Chile Burrito">Beef & Red Chile Burrito</label>
          <label class="item"><input type="radio" name="burritoChoice" value="Beef & Green Chile Burrito">Beef & Green Chile Burrito</label>
          <label class="item"><input type="radio" name="burritoChoice" value="Chicken & Green Chile Burrito">Chicken & Green Chile Burrito</label>
          <label class="item"><input type="radio" name="burritoChoice" value="Chile Relleno Burrito">Chile Relleno Burrito</label>
        </div>
      </div>

      <div class="field">
        <label class="main">Add-ons</label>
        <div class="checkbox-group">
          <label class="item"><input type="checkbox" id="addRice">Rice</label>
          <label class="item"><input type="checkbox" id="addCheese">Cheese</label>
          <label class="item"><input type="checkbox" id="addGreenOnion">Green Onion</label>
          <label class="item"><input type="checkbox" id="addLettuce">Lettuce</label>
        </div>
      </div>

      <div class="field">
        <label class="item">
          <input type="checkbox" id="extraTaco">
          Add up to 1 taco
        </label>
      </div>

      <div id="extraTacoSection" class="hidden">
        <div class="field">
          <label class="main">Extra Taco Type</label>
          <div class="radio-group">
            <label class="item"><input type="radio" name="extraTacoType" value="Picadillo Taco">Picadillo Taco</label>
            <label class="item"><input type="radio" name="extraTacoType" value="Chicken & Green Chile">Chicken & Green Chile</label>
          </div>
        </div>

        <div class="field">
          <label class="item">
            <input type="checkbox" id="extraTacoHotSauce">
            Add Hot Sauce
          </label>
        </div>
      </div>
    </div>

    <div id="tacoSection" class="hidden">
      <div class="field">
        <label class="main">3 Taco Order Type</label>
        <div class="radio-group">
          <label class="item"><input type="radio" name="tacoPlateType" value="Picadillo Taco">Picadillo Taco</label>
          <label class="item"><input type="radio" name="tacoPlateType" value="Chicken & Green Chile">Chicken & Green Chile</label>
        </div>
      </div>

      <div class="field">
        <label class="item">
          <input type="checkbox" id="tacoPlateHotSauce">
          Add Hot Sauce
        </label>
      </div>
    </div>

    <button type="submit" id="submitBtn">Submit Order</button>
  </form>

  <div id="status"></div>
</div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbw0m52ncEEPWRfIJ-BTuMpRTUVNBJ5kwR8cRHt5WvXu9wv398-K--jiXH892epTCf0ZIQ/exec";
  const ITEM_HEIGHT = 40;
  const VISIBLE_CENTER_TOP = 62;
  const serialDigits = [0, 0, 0, 0, 0];

  function setStatus(msg, color = "green") {
    const el = document.getElementById("status");
    el.textContent = msg;
    el.style.color = color;
  }

  function clearRadioGroup(name) {
    document.querySelectorAll('input[name="' + name + '"]').forEach(el => {
      el.checked = false;
    });
  }

  function buildPickerList(current) {
    let html = "";
    for (let block = 0; block < 5; block++) {
      for (let d = 0; d <= 9; d++) {
        let cls = "picker-item";

        if (block === 2 && d === current) {
          cls += " selected";
        } else if (
          block === 2 &&
          (d === (current + 9) % 10 || d === (current + 1) % 10)
        ) {
          cls += " near";
        }

        html += `<div class="${cls}">${d}</div>`;
      }
    }
    return html;
  }

  function setWheelPosition(index, animate = true) {
    const wheel = document.querySelectorAll(".picker-wheel")[index];
    const list = wheel.querySelector(".picker-list");
    const targetIndex = 20 + serialDigits[index];
    const y = VISIBLE_CENTER_TOP - (targetIndex * ITEM_HEIGHT);

    list.innerHTML = buildPickerList(serialDigits[index]);
    list.style.transition = animate ? "transform 180ms cubic-bezier(.22,.8,.32,1)" : "none";
    list.style.transform = `translateY(${y}px)`;
  }

  function initSerialWheels() {
    document.querySelectorAll(".picker-wheel").forEach((wheel, index) => {
      const list = wheel.querySelector(".picker-list");
      list.innerHTML = buildPickerList(serialDigits[index]);
      setWheelPosition(index, false);

      let startY = 0;
      let startTransform = 0;
      let currentTransform = 0;
      let dragging = false;
      let moved = false;

      function readTranslateY() {
        const style = window.getComputedStyle(list);
        const matrix = new DOMMatrixReadOnly(style.transform);
        return matrix.m42;
      }

      function begin(y) {
        dragging = true;
        moved = false;
        startY = y;
        currentTransform = readTranslateY();
        startTransform = currentTransform;
        list.style.transition = "none";
      }

      function move(y) {
        if (!dragging) return;
        const delta = y - startY;
        if (Math.abs(delta) > 2) moved = true;
        currentTransform = startTransform + delta;
        list.style.transform = `translateY(${currentTransform}px)`;
      }

      function end() {
        if (!dragging) return;
        dragging = false;

        let nearest = Math.round((VISIBLE_CENTER_TOP - currentTransform) / ITEM_HEIGHT);
        if (nearest < 10) nearest = 10;
        if (nearest > 39) nearest = 39;

        const digit = ((nearest % 10) + 10) % 10;
        serialDigits[index] = digit;
        setWheelPosition(index, true);
      }

      wheel.addEventListener("touchstart", (e) => begin(e.touches[0].clientY), { passive: true });
      wheel.addEventListener("touchmove", (e) => move(e.touches[0].clientY), { passive: true });
      wheel.addEventListener("touchend", end, { passive: true });

      wheel.addEventListener("mousedown", (e) => {
        e.preventDefault();
        begin(e.clientY);
      });

      window.addEventListener("mousemove", (e) => move(e.clientY));
      window.addEventListener("mouseup", end);

      wheel.addEventListener("wheel", (e) => {
        e.preventDefault();
        serialDigits[index] = (serialDigits[index] + (e.deltaY > 0 ? 1 : 9)) % 10;
        setWheelPosition(index, true);
      }, { passive: false });

      wheel.addEventListener("click", (e) => {
        if (moved) return;
        const rect = wheel.getBoundingClientRect();
        const y = e.clientY - rect.top;
        if (y < rect.height / 2) {
          serialDigits[index] = (serialDigits[index] + 9) % 10;
        } else {
          serialDigits[index] = (serialDigits[index] + 1) % 10;
        }
        setWheelPosition(index, true);
      });
    });
  }

  function getSerialNumber() {
    return serialDigits.join("");
  }

  function resetSerialWheels() {
    for (let i = 0; i < serialDigits.length; i++) {
      serialDigits[i] = 0;
      setWheelPosition(i, false);
    }
  }

  function loadNames() {
    window.nameCallback = function(data) {
      const select = document.getElementById("memberName");

      if (!data || !data.ok) {
        setStatus("Name load failed: " + ((data && data.error) || "Unknown error"), "red");
        select.innerHTML = '<option value="">Unable to load names</option>';
        return;
      }

      select.innerHTML = '<option value="">Select Name</option>';

      data.names.forEach(name => {
        const option = document.createElement("option");
        option.value = name;
        option.textContent = name;
        select.appendChild(option);
      });

      if (!data.names.length) {
        select.innerHTML = '<option value="">No names found</option>';
      }
    };

    const oldScript = document.getElementById("jsonpNames");
    if (oldScript) oldScript.remove();

    const script = document.createElement("script");
    script.id = "jsonpNames";
    script.src = API + "?action=getNames&callback=nameCallback&_=" + Date.now();
    script.onerror = function() {
      setStatus("Name load failed: unable to reach Apps Script endpoint.", "red");
      document.getElementById("memberName").innerHTML =
        '<option value="">Unable to load names</option>';
    };

    document.body.appendChild(script);
  }

  function updateMeal() {
    const type = document.querySelector('input[name="mealType"]:checked')?.value;
    const burritoSection = document.getElementById("burritoSection");
    const tacoSection = document.getElementById("tacoSection");

    burritoSection.classList.add("hidden");
    tacoSection.classList.add("hidden");

    if (type === "Burrito") {
      burritoSection.classList.remove("hidden");
      clearRadioGroup("tacoPlateType");
      document.getElementById("tacoPlateHotSauce").checked = false;
    }

    if (type === "3 Tacos") {
      tacoSection.classList.remove("hidden");
      clearRadioGroup("burritoChoice");
      document.getElementById("addRice").checked = false;
      document.getElementById("addCheese").checked = false;
      document.getElementById("addGreenOnion").checked = false;
      document.getElementById("addLettuce").checked = false;
      document.getElementById("extraTaco").checked = false;
      document.getElementById("extraTacoSection").classList.add("hidden");
      clearRadioGroup("extraTacoType");
      document.getElementById("extraTacoHotSauce").checked = false;
    }
  }

  function updateExtra() {
    const checked = document.getElementById("extraTaco").checked;
    const section = document.getElementById("extraTacoSection");

    if (checked) {
      section.classList.remove("hidden");
    } else {
      section.classList.add("hidden");
      clearRadioGroup("extraTacoType");
      document.getElementById("extraTacoHotSauce").checked = false;
    }
  }

  document.querySelectorAll('input[name="mealType"]').forEach(el => {
    el.addEventListener("change", updateMeal);
  });

  document.getElementById("extraTaco").addEventListener("change", updateExtra);

  document.getElementById("mealForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const submitBtn = document.getElementById("submitBtn");

    const memberName = document.getElementById("memberName").value;
    const serialNumber = getSerialNumber();
    const mealType = document.querySelector('input[name="mealType"]:checked')?.value || "";
    const burritoChoice = document.querySelector('input[name="burritoChoice"]:checked')?.value || "";
    const extraTaco = document.getElementById("extraTaco").checked;
    const extraTacoType = document.querySelector('input[name="extraTacoType"]:checked')?.value || "";
    const tacoPlateType = document.querySelector('input[name="tacoPlateType"]:checked')?.value || "";

    if (!memberName) {
      setStatus("Please select who’s eating this order.", "red");
      return;
    }

    if (!/^\d{5}$/.test(serialNumber)) {
      setStatus("Please align all 5 serial digits.", "red");
      return;
    }

    if (!mealType) {
      setStatus("Please choose Burrito or 3 Tacos.", "red");
      return;
    }

    if (mealType === "Burrito" && !burritoChoice) {
      setStatus("Please choose a burrito option.", "red");
      return;
    }

    if (mealType === "3 Tacos" && !tacoPlateType) {
      setStatus("Please choose a 3 taco order type.", "red");
      return;
    }

    if (mealType === "Burrito" && extraTaco && !extraTacoType) {
      setStatus("Please choose the extra taco type.", "red");
      return;
    }

    const data = {
      memberName: memberName,
      serialNumber: serialNumber,
      mealType: mealType,
      burritoChoice: burritoChoice,
      addRice: document.getElementById("addRice").checked,
      addCheese: document.getElementById("addCheese").checked,
      addGreenOnion: document.getElementById("addGreenOnion").checked,
      addLettuce: document.getElementById("addLettuce").checked,
      extraTaco: extraTaco,
      extraTacoType: extraTacoType,
      extraTacoHotSauce: document.getElementById("extraTacoHotSauce").checked,
      tacoPlateType: tacoPlateType,
      tacoPlateHotSauce: document.getElementById("tacoPlateHotSauce").checked
    };

    try {
      setStatus("Submitting...");
      submitBtn.disabled = true;
      submitBtn.textContent = "Submitting...";

      const res = await fetch(API, {
        method: "POST",
        redirect: "follow",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({
          action: "submitOrder",
          formData: data
        })
      });

      const text = await res.text();

      try {
        const json = JSON.parse(text);
        if (!json.ok) {
          throw new Error(json.error || "Submit failed.");
        }
        setStatus(json.message || "Order submitted!");
      } catch {
        setStatus("Order submitted!");
      }

      document.getElementById("mealForm").reset();
      document.getElementById("burritoSection").classList.add("hidden");
      document.getElementById("tacoSection").classList.add("hidden");
      document.getElementById("extraTacoSection").classList.add("hidden");
      resetSerialWheels();
    } catch (err) {
      setStatus("Submit failed: " + err.message, "red");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Submit Order";
    }
  });

  initSerialWheels();
  loadNames();
</script>

</body>
</html>
