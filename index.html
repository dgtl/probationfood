<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ramona's Meal Order Form</title>

<style>

body{
margin:0;
padding:30px;
font-family:Arial;
background:
linear-gradient(rgba(61,29,11,.18),rgba(61,29,11,.18)),
url('https://lirp.cdn-website.com/c174546f/dms3rep/multi/opt/logo-1920w.png') center / 420px repeat,
#d89024;
}

.container{
max-width:900px;
margin:auto;
padding:28px;
border-radius:20px;
background:rgba(255,255,255,.88);
box-shadow:0 8px 30px rgba(0,0,0,.3);
}

h1{
margin-top:0;
font-size:34px;
color:#5a160f;
}

.intro{
margin-bottom:20px;
}

.section{
margin-top:25px;
font-weight:bold;
font-size:18px;
}

.field{
margin-top:12px;
padding:14px;
border-radius:12px;
background:rgba(255,255,255,.82);
border:1px solid rgba(0,0,0,.1);
}

label.main{
display:block;
margin-bottom:8px;
font-weight:bold;
}

select,button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

.radio-group,.checkbox-group{
display:grid;
gap:8px;
}

.item{
display:flex;
align-items:center;
gap:8px;
padding:10px;
background:white;
border-radius:8px;
border:1px solid #eee;
}

button{
background:#8b1e14;
color:white;
border:none;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

button:hover{
background:#74180f;
}

.hidden{
display:none;
}

#status{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>Ramona's Meal Order Form</h1>
<p class="intro">Tell Sgt Dear your food order below.</p>

<form id="mealForm">

<div class="field">
<label class="main">Member Name</label>
<select id="memberName">
<option>Loading names...</option>
</select>
</div>

<div class="section">Meal Selection</div>

<div class="field">

<label class="item">
<input type="radio" name="mealType" value="Burrito">
Burrito
</label>

<label class="item">
<input type="radio" name="mealType" value="3 Tacos">
3 Tacos
</label>

</div>

<div id="burritoSection" class="hidden">

<div class="field">

<label class="main">Burrito Choice</label>

<label class="item">
<input type="radio" name="burritoChoice" value="Beef & Red Chile Burrito">
Beef & Red Chile Burrito
</label>

<label class="item">
<input type="radio" name="burritoChoice" value="Beef & Green Chile Burrito">
Beef & Green Chile Burrito
</label>

<label class="item">
<input type="radio" name="burritoChoice" value="Chicken & Green Chile Burrito">
Chicken & Green Chile Burrito
</label>

<label class="item">
<input type="radio" name="burritoChoice" value="Chile Relleno Burrito">
Chile Relleno Burrito
</label>

</div>

<div class="field">

<label class="main">Add-ons</label>

<label class="item"><input type="checkbox" id="addRice">Rice</label>
<label class="item"><input type="checkbox" id="addCheese">Cheese</label>
<label class="item"><input type="checkbox" id="addGreenOnion">Green Onion</label>
<label class="item"><input type="checkbox" id="addLettuce">Lettuce</label>

</div>

<div class="field">

<label class="item">
<input type="checkbox" id="extraTaco">
Add up to 1 taco
</label>

</div>

<div id="extraTacoSection" class="hidden">

<div class="field">

<label class="main">Extra Taco Type</label>

<label class="item">
<input type="radio" name="extraTacoType" value="Picadillo Taco">
Picadillo Taco
</label>

<label class="item">
<input type="radio" name="extraTacoType" value="Chicken & Green Chile">
Chicken & Green Chile
</label>

</div>

<div class="field">
<label class="item">
<input type="checkbox" id="extraTacoHotSauce">
Add Hot Sauce
</label>
</div>

</div>

</div>


<div id="tacoSection" class="hidden">

<div class="field">

<label class="main">3 Taco Order Type</label>

<label class="item">
<input type="radio" name="tacoPlateType" value="Picadillo Taco">
Picadillo Taco
</label>

<label class="item">
<input type="radio" name="tacoPlateType" value="Chicken & Green Chile">
Chicken & Green Chile
</label>

</div>

<div class="field">
<label class="item">
<input type="checkbox" id="tacoPlateHotSauce">
Add Hot Sauce
</label>
</div>

</div>


<button type="submit">Submit Order</button>

</form>

<div id="status"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbw0m52ncEEPWRfIJ-BTuMpRTUVNBJ5kwR8cRHt5WvXu9wv398-K--jiXH892epTCf0ZIQ/exec";

function setStatus(msg,color="green"){
document.getElementById("status").innerHTML=msg;
document.getElementById("status").style.color=color;
}

/* LOAD NAMES */

function loadNames(){

window.nameCallback=function(data){

const select=document.getElementById("memberName");
select.innerHTML='<option>Select Name</option>';

data.names.forEach(n=>{
const o=document.createElement("option");
o.value=n;
o.textContent=n;
select.appendChild(o);
});

};

const s=document.createElement("script");
s.src=API+"?action=getNames&callback=nameCallback";
document.body.appendChild(s);

}

/* FORM LOGIC */

document.querySelectorAll('input[name="mealType"]').forEach(el=>{
el.addEventListener("change",()=>{
document.getElementById("burritoSection").classList.add("hidden");
document.getElementById("tacoSection").classList.add("hidden");

if(el.value==="Burrito" && el.checked)
document.getElementById("burritoSection").classList.remove("hidden");

if(el.value==="3 Tacos" && el.checked)
document.getElementById("tacoSection").classList.remove("hidden");

});
});

document.getElementById("extraTaco").addEventListener("change",()=>{
document.getElementById("extraTacoSection").classList.toggle("hidden");
});

/* SUBMIT */

document.getElementById("mealForm").addEventListener("submit",async e=>{

e.preventDefault();

const data={
memberName:memberName.value,
mealType:document.querySelector('input[name="mealType"]:checked')?.value||"",
burritoChoice:document.querySelector('input[name="burritoChoice"]:checked')?.value||"",
addRice:addRice.checked,
addCheese:addCheese.checked,
addGreenOnion:addGreenOnion.checked,
addLettuce:addLettuce.checked,
extraTaco:extraTaco.checked,
extraTacoType:document.querySelector('input[name="extraTacoType"]:checked')?.value||"",
extraTacoHotSauce:extraTacoHotSauce.checked,
tacoPlateType:document.querySelector('input[name="tacoPlateType"]:checked')?.value||"",
tacoPlateHotSauce:tacoPlateHotSauce.checked
};

setStatus("Submitting...");

await fetch(API,{
method:"POST",
body:JSON.stringify({action:"submitOrder",formData:data})
});

setStatus("Order submitted!");

document.getElementById("mealForm").reset();

});

loadNames();

</script>

</body>
</html>
