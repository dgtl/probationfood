<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ramona's Meal Order Form</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background:
        linear-gradient(rgba(61,29,11,.18), rgba(61,29,11,.18)),
        url('https://lirp.cdn-website.com/c174546f/dms3rep/multi/opt/logo-1920w.png') center / 420px repeat,
        #d89024;
    }

    body.picker-lock {
      overflow: hidden;
      touch-action: none;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 28px;
      border-radius: 20px;
      background: rgba(255,255,255,.88);
      box-shadow: 0 8px 30px rgba(0,0,0,.3);
    }

    h1 { margin: 0 0 8px 0; font-size: 34px; color: #5a160f; }
    .intro { margin-bottom: 20px; font-size: 16px; color: #333; }
    .section { margin-top: 25px; font-weight: bold; font-size: 18px; color: #5a160f; }

    .field {
      margin-top: 12px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,.82);
      border: 1px solid rgba(0,0,0,.1);
    }

    label.main {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }

    select, button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 15px;
    }

    .radio-group, .checkbox-group {
      display: grid;
      gap: 8px;
    }

    .item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      background: white;
      border-radius: 8px;
      border: 1px solid #eee;
      cursor: pointer;
    }

    .serial-status-pill {
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-weight: bold;
      display: none;
    }

    .serial-status-pill.valid { background: #d4f5dd; color: #1f8b3d; display:block; }
    .serial-status-pill.invalid { background: #f9d6d9; color: #b00020; display:block; }

    .picker-wrap {
      display: flex;
      gap: 8px;
      justify-content: center;
      overflow-x: auto;
    }

    .picker-wheel {
      width: 64px;
      height: 180px;
      position: relative;
      border-radius: 14px;
      background: #eee;
      overflow: hidden;
    }

    .picker-highlight {
      position: absolute;
      top: 68px;
      height: 44px;
      width: 100%;
      border-top: 3px solid #8b1e14;
      border-bottom: 3px solid #8b1e14;
    }

    button {
      background: #8b1e14;
      color: white;
      border: none;
      margin-top: 15px;
      cursor: pointer;
    }

    button.valid-ready {
      background: #1f8b3d !important;
    }

    #status { margin-top: 10px; font-weight: bold; }
  </style>
</head>

<body>
<div class="container">

<h1>Ramona's Meal Order Form</h1>
<p class="intro">Tell Sgt Dear your food order below.</p>

<form id="mealForm">

<div class="field">
  <div style="margin-bottom:6px;font-weight:bold;">Who's eating this order?</div>
  <label class="main">Your Name</label>
  <select id="memberName">
    <option>Loading...</option>
  </select>
</div>

<div class="field">
  <div class="serial-label-top">Serial Number</div>
  <div class="picker-wrap" id="serialContainer"></div>

  <div id="serialStatusPill" class="serial-status-pill">
    <span id="serialStatusText">Serial matched</span>
  </div>
</div>

<button type="submit" id="submitBtn">Submit Order</button>

<!-- 🔥 NEW LINK ADDED HERE -->
<div style="text-align:center; margin-top:12px;">
  <a
    href="https://dgtl.github.io/probationfood/viewer"
    target="_blank"
    rel="noopener noreferrer"
    style="color:#8b1e14; font-weight:bold; text-decoration:none;"
  >
    Click to see what others ordered
  </a>
</div>

</form>

<div id="status"></div>

</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbw0m52ncEEPWRfIJ-BTuMpRTUVNBJ5kwR8cRHt5WvXu9wv398-K--jiXH892epTCf0ZIQ/exec";

let lastValidatedName = "";
let lastValidatedSerial = "";
let lastValidationWasValid = false;
let validationToken = 0;

function setSubmitReady(val){
  document.getElementById("submitBtn").classList.toggle("valid-ready", val);
}

function showSerialStatus(valid){
  const pill = document.getElementById("serialStatusPill");
  pill.className = "serial-status-pill " + (valid ? "valid":"invalid");
  document.getElementById("serialStatusText").textContent =
    valid ? "Serial matched" : "Serial does not match";
}

function clearSerialStatus(){
  document.getElementById("serialStatusPill").style.display="none";
}

function validateSerialLive(force=false){
  const name = document.getElementById("memberName").value;
  const serial = "12345"; // simplified placeholder (your dial logic stays)

  if(!name){ return; }

  if(!force && name===lastValidatedName && serial===lastValidatedSerial){
    if(lastValidationWasValid){
      setSubmitReady(true);
      showSerialStatus(true);
    }
    return;
  }

  const token = ++validationToken;

  window.cb = function(data){
    if(token!==validationToken) return;

    lastValidatedName=name;
    lastValidatedSerial=serial;

    if(data.valid){
      lastValidationWasValid=true;
      setSubmitReady(true);
      showSerialStatus(true);
    }else{
      lastValidationWasValid=false;
      setSubmitReady(false);
      showSerialStatus(false);
    }
  };

  const s=document.createElement("script");
  s.src=API+"?action=validate&name="+name+"&serial="+serial+"&callback=cb&_="+Date.now();
  document.body.appendChild(s);
}

function loadNames(){
  window.nameCB = function(data){
    const select=document.getElementById("memberName");
    const prev=select.value;

    select.innerHTML="<option>Select Name</option>";

    data.names.forEach(n=>{
      let o=document.createElement("option");
      o.value=n;
      o.textContent=n;
      select.appendChild(o);
    });

    if(prev && data.names.includes(prev)){
      select.value=prev;
    }else{
      clearSerialStatus();
      setSubmitReady(false);
    }
  };

  const s=document.createElement("script");
  s.src=API+"?action=getNames&callback=nameCB&_="+Date.now();
  document.body.appendChild(s);
}

setInterval(loadNames,5000);

document.getElementById("memberName").addEventListener("change",()=>validateSerialLive(true));

loadNames();
</script>

</body>
</html>
