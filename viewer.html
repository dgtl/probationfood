<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sgt Dear is Treatin'</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      color: #222;
      background:
        linear-gradient(rgba(255,255,255,.84), rgba(255,255,255,.84)),
        url('https://lirp.cdn-website.com/c174546f/dms3rep/multi/opt/logo-1920w.png') center / 360px repeat,
        #f3f4f6;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 34px;
      color: #5a160f;
    }

    .meta {
      margin-bottom: 18px;
      color: #555;
      font-size: 14px;
    }

    .toolbar {
      margin-bottom: 18px;
    }

    button {
      padding: 10px 14px;
      border: none;
      border-radius: 10px;
      background: #8b1e14;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #74180f;
    }

    .summary {
      background: rgba(255,255,255,.94);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
      margin-bottom: 18px;
    }

    .summary-total {
      font-size: 42px;
      font-weight: bold;
      color: #8b1e14;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .card {
      background: rgba(255,255,255,.94);
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }

    .card h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #8b1e14;
    }

    .row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
    }

    .row:last-child {
      border-bottom: none;
    }

    .label {
      flex: 1;
    }

    .count {
      font-weight: bold;
      min-width: 24px;
      text-align: right;
    }

    .table-wrap {
      background: rgba(255,255,255,.95);
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 16px rgba(0,0,0,.08);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #eee;
      vertical-align: top;
    }

    th {
      background: #8b1e14;
      color: white;
      font-size: 14px;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .muted {
      color: #666;
    }

    @media (max-width: 700px) {
      body { padding: 12px; }
      h1 { font-size: 28px; }
      .summary-total { font-size: 34px; }
      th, td { padding: 10px; font-size: 14px; }
    }
  </style>
</head>
<body>

<div class="wrap">
  <h1>Sgt Dear completed probation &amp; he's treatin' 🎉<br><span style="font-size:22px;color:#333;">Look who's eatin' — get your order in!</span></h1>
  <div class="meta" id="updated">Loading...</div>

  <div class="toolbar">
    <button onclick="loadOrders()">Refresh now</button>
  </div>

  <div class="summary">
    <div class="muted">Total Orders</div>
    <div class="summary-total" id="totalOrders">0</div>
  </div>

  <div class="grid">
    <div class="card">
      <h2>Burritos</h2>
      <div id="burritos"></div>
    </div>

    <div class="card">
      <h2>3 Taco Orders</h2>
      <div id="tacos3"></div>
    </div>

    <div class="card">
      <h2>Extra Tacos</h2>
      <div id="extraTacos"></div>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Meal</th>
          <th>Main Choice</th>
        </tr>
      </thead>
      <tbody id="ordersTable"></tbody>
    </table>
  </div>
</div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbw0m52ncEEPWRfIJ-BTuMpRTUVNBJ5kwR8cRHt5WvXu9wv398-K--jiXH892epTCf0ZIQ/exec";

  function renderSection(targetId, items) {
    const el = document.getElementById(targetId);
    el.innerHTML = items.map(item => `
      <div class="row">
        <div class="label">${item.label}</div>
        <div class="count">${item.count}</div>
      </div>
    `).join("");
  }

  function formatTime(v) {
    if (!v) return "";
    const d = new Date(v);
    if (isNaN(d.getTime())) return String(v);
    return d.toLocaleString();
  }

  function loadOrders() {
    window.ordersCallback = function(resp) {
      if (!resp || !resp.ok) {
        document.getElementById("updated").textContent =
          "Load failed: " + ((resp && resp.error) || "Unknown error");
        return;
      }

      const data = resp.data;
      document.getElementById("updated").textContent =
        "Last refreshed: " + new Date().toLocaleString();

      document.getElementById("totalOrders").textContent = data.totals.totalOrders || 0;

      // Render whatever keys the API actually returns — no hardcoding
      function tallyFromObject(obj) {
        if (!obj) return [];
        return Object.entries(obj)
          .filter(([, count]) => count > 0)
          .sort((a, b) => b[1] - a[1])
          .map(([label, count]) => ({ label, count }));
      }

      const burritoItems = tallyFromObject(data.totals.burritos);
      renderSection("burritos", burritoItems.length ? burritoItems : [{ label: "No orders yet", count: "" }]);

      const tacoItems = tallyFromObject(data.totals.tacos3);
      renderSection("tacos3", tacoItems.length ? tacoItems : [{ label: "No orders yet", count: "" }]);

      const extraItems = tallyFromObject(data.totals.extraTacos);
      renderSection("extraTacos", extraItems.length ? extraItems : [{ label: "No orders yet", count: "" }]);

      const tbody = document.getElementById("ordersTable");
      const orders = data.orders || [];

      if (!orders.length) {
        tbody.innerHTML = `<tr><td colspan="5" class="muted">No orders yet.</td></tr>`;
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const mainChoice = order.burritoChoice || order.tacoPlateType || "";
        const extraTaco = order.extraTacoType ? ` <span style="color:#888;font-size:12px;">+${order.extraTacoType}</span>` : "";
        return `
        <tr>
          <td>${order.memberName || ""}</td>
          <td>${order.mealType || ""}</td>
          <td>${mainChoice}${extraTaco}</td>
        </tr>`;
      }).join("");
    };

    const oldScript = document.getElementById("jsonpOrders");
    if (oldScript) oldScript.remove();

    const script = document.createElement("script");
    script.id = "jsonpOrders";
    script.src = API + "?action=getOrders&callback=ordersCallback&_=" + Date.now();
    document.body.appendChild(script);
  }

  loadOrders();
  setInterval(loadOrders, 15000);
</script>

</body>
</html>
